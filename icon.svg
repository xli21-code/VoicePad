<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- macOS squircle clip path -->
    <clipPath id="squircle">
      <path d="M512 0C769 0 819 0 904.5 40.5C949 62 985 98 1006.5 142.5C1024 190 1024 255 1024 512C1024 769 1024 834 1006.5 881.5C985 926 949 962 904.5 983.5C834 1024 769 1024 512 1024C255 1024 190 1024 142.5 1006.5C98 985 62 949 40.5 904.5C0 834 0 769 0 512C0 255 0 190 40.5 142.5C62 98 98 62 142.5 40.5C190 0 255 0 512 0Z"/>
    </clipPath>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2E5FA1"/>
    </linearGradient>
    <!-- Subtle inner shadow -->
    <linearGradient id="shine" x1="0.5" y1="0" x2="0.5" y2="0.3">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#shine)"/>
  </g>

  <!-- Microphone body -->
  <rect x="440" y="240" width="144" height="280" rx="72" fill="white"/>

  <!-- Microphone arc -->
  <path d="M360 480 Q360 620 512 620 Q664 620 664 480"
        fill="none" stroke="white" stroke-width="40" stroke-linecap="round"/>

  <!-- Microphone stand -->
  <line x1="512" y1="620" x2="512" y2="720" stroke="white" stroke-width="40" stroke-linecap="round"/>

  <!-- Text cursor (blinking line) -->
  <rect x="570" y="680" width="6" height="60" rx="3" fill="white" opacity="0.9"/>

  <!-- Sound waves (right side, subtle) -->
  <path d="M700 380 Q740 440 700 500" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
  <path d="M760 340 Q820 440 760 540" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.35"/>
</svg>
